scripts:
  server:
    - cd src && python manage.py runserver 8001
  dev_server:
    - cd src && python manage.py runserver 0.0.0.0:8001
  makemigrations:
    - cd src && python manage.py makemigrations
  migrate:
    - cd src && python manage.py migrate
  shell:
    - cd src && python manage.py shell
  curl_auth: |
    curl -X POST -H "Content-Type: application/json" -d '{"username": "cfe", "password": "learncode"}' http://127.0.0.1:8001/api/token/pair
  curl_protect: |
    curl -X GET -H "Authorization: Bearer <curl_auth-access-token>" http://127.0.0.1:8001/api/me
  test:
    - cd src && python manage.py test
  seed:
    - cd src && python manage.py seed_db
  seed_reset:
    - cd src && python manage.py seed_db --reset
  createsuperuser:
    - cd src && python manage.py createsuperuser
  showmigrations:
    - cd src && python manage.py showmigrations
  dbshell:
    - cd src && python manage.py dbshell
  flushexpiredtokens:
    - cd src && python manage.py flushexpiredtokens
  flush:
    - cd src && python manage.py flush
